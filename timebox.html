<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LevelUp Habits</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafbfc;
      --card: #ffffff;
      --card-hover: #fafbfc;
      --border: #eaecf0;
      --border-light: #f2f4f7;
      --text: #101828;
      --text-secondary: #344054;
      --text-muted: #98a2b3;
      --accent: #7c3aed;
      --accent-light: #8b5cf6;
      --accent-bg: #f5f3ff;
      --accent-border: #e9d5ff;
      --green: #059669;
      --green-bg: #ecfdf5;
      --green-border: #a7f3d0;
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --shadow-sm: 0 1px 2px rgba(16,24,40,0.05);
      --shadow-md: 0 4px 12px rgba(16,24,40,0.08);
      --shadow-lg: 0 12px 40px rgba(16,24,40,0.12);
      --radius: 12px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HEADER ========== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .date-nav button {
      background: none;
      border: none;
      color: var(--text-secondary);
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
    }

    .date-nav button:hover { background: var(--bg); color: var(--accent); }

    .date-display {
      font-size: 13px;
      font-weight: 600;
      padding: 0 8px;
      color: var(--text-secondary);
      min-width: 120px;
      text-align: center;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .date-display .today-label {
      color: var(--accent);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* ========== USER PROFILE ========== */
    .user-profile { position: relative; }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--border);
      transition: border-color 0.15s;
    }

    .user-avatar:hover { border-color: var(--accent); }

    .user-menu {
      display: none;
      position: absolute;
      top: 44px;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      min-width: 220px;
      box-shadow: var(--shadow-lg);
      z-index: 300;
    }

    .user-menu.open { display: block; }

    .user-menu-info {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 4px;
    }

    .user-menu-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user-menu-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .user-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .user-menu button:hover { background: var(--red-bg); }

    /* ========== LOGIN SCREEN ========== */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #f5f3ff 0%, #fafbfc 50%, #ecfdf5 100%);
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 44px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 22px;
      margin: 0 auto 20px;
    }

    .login-card h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 32px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      font-family: inherit;
    }

    .google-btn:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent-border);
      transform: translateY(-1px);
    }

    .google-btn svg { width: 18px; height: 18px; }

    .app-content { display: none; }

    /* ========== SCORE SUMMARY ========== */
    .score-bar {
      max-width: 860px;
      margin: 24px auto 0;
      padding: 0 24px;
    }

    .score-bar-inner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      box-shadow: var(--shadow-sm);
    }

    .total-score { text-align: center; min-width: 100px; }

    .total-score .number {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .total-score .max {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .progress-ring { position: relative; width: 96px; height: 96px; }
    .progress-ring svg { transform: rotate(-90deg); }

    .progress-ring .progress-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-breakdown {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
    }

    .score-chip {
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 1.5px solid transparent;
    }

    .score-chip:hover { background: var(--accent-bg); border-color: var(--accent-border); }

    .score-chip.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    .score-chip .chip-name {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }

    .score-chip .chip-score { font-size: 17px; font-weight: 700; color: var(--accent); }
    .score-chip .chip-max { font-size: 11px; color: var(--text-muted); font-weight: 500; }

    /* ========== CATEGORIES ========== */
    .container {
      max-width: 860px;
      margin: 16px auto 0;
      padding: 0 24px;
    }

    .category {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .category:hover { box-shadow: var(--shadow-md); border-color: #d0d5dd; }

    .category-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .category-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .category-title { font-size: 14px; font-weight: 600; color: var(--text); }

    .category-score-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .category-score {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .category-toggle {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .category.collapsed .category-toggle { transform: rotate(-90deg); }

    .category-body { padding: 0 20px 16px; }
    .category.collapsed .category-body { display: none; }

    /* ========== ITEMS ========== */
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      gap: 12px;
    }

    .item:last-of-type { border-bottom: none; }

    .item-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .item-check {
      width: 22px;
      height: 22px;
      border: 2px solid #d0d5dd;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .item-check:hover { border-color: var(--accent); }

    .item-check.checked {
      background: var(--green);
      border-color: var(--green);
      animation: checkPop 0.3s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .item-check.checked::after {
      content: '\2713';
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .item-name {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .item.done .item-name {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .item-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .item-input {
      width: 48px;
      height: 32px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      transition: all 0.15s;
      font-family: inherit;
    }

    .item-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

    .item-max { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .item-delete {
      width: 26px;
      height: 26px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: all 0.15s;
    }

    .item:hover .item-delete { opacity: 1; }
    .item-delete:hover { color: var(--red); background: var(--red-bg); }

    /* ========== ADD ITEM ========== */
    .add-item-row {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      margin-top: 4px;
      border-top: 1px solid var(--border-light);
    }

    .add-item-row input {
      height: 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .add-item-row input:first-child { flex: 1; }
    .add-item-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .add-item-row input[type="number"] { width: 56px; text-align: center; }

    .add-item-row button {
      height: 36px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .add-item-row button:hover { background: var(--accent-light); transform: translateY(-1px); }

    /* ========== ADD CATEGORY ========== */
    .add-category-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
      font-family: inherit;
    }

    .add-category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    /* ========== HISTORY ========== */
    .history-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 12px;
      width: 100%;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
    }

    .history-toggle:hover { color: var(--accent); border-color: var(--accent-border); }

    /* Export & Data Table */
    .export-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .export-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      box-shadow: var(--shadow-sm);
    }

    .export-btn:hover { color: var(--accent); border-color: var(--accent-border); }
    .export-btn svg { width: 16px; height: 16px; }

    .data-table-panel {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .data-table-panel.open { display: block; }

    .data-table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .data-table-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .data-table-header select {
      height: 32px;
      padding: 0 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .data-table-wrap {
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table th {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 10px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-secondary);
      white-space: nowrap;
      font-weight: 500;
    }

    .data-table tr:hover td { background: var(--bg); }

    .data-table .score-cell {
      font-weight: 700;
      text-align: center;
    }

    .data-table .score-full { color: var(--green); background: var(--green-bg); border-radius: 4px; }
    .data-table .score-partial { color: var(--amber); }
    .data-table .score-zero { color: var(--text-muted); }

    .category-delete {
      width: 30px;
      height: 30px;
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: all 0.15s;
      margin-left: 4px;
    }

    .category .category-delete { opacity: 0.5; }
    .category-delete:hover { color: var(--red); background: var(--red-bg); border-color: #fecaca; }

    .category-move {
      width: 28px;
      height: 28px;
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0.5;
      transition: all 0.15s;
      padding: 0;
      line-height: 1;
    }

    .category-move:hover { color: var(--accent); background: var(--accent-bg); opacity: 1; }
    .category-move:disabled { opacity: 0.15; cursor: default; }
    .category-move:disabled:hover { color: var(--text-muted); background: none; }

    .history-panel {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }

    .history-panel.open { display: block; }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 13px;
    }

    .history-row:last-child { border-bottom: none; }
    .history-date { color: var(--text-muted); font-weight: 500; }
    .history-score { font-weight: 700; }

    .streak-bar { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }

    .streak-day {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--border-light);
    }

    .streak-day.low { background: #e9d5ff; }
    .streak-day.mid { background: #c084fc; }
    .streak-day.high { background: #a855f7; }
    .streak-day.full { background: var(--accent); }

    /* ========== MODAL ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16,24,40,0.4);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal input, .modal select {
      width: 100%;
      height: 40px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .modal input:focus, .modal select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn-cancel { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-confirm { background: var(--accent); color: #fff; }
    .btn-cancel:hover { background: var(--border-light); }
    .btn-confirm:hover { background: var(--accent-light); transform: translateY(-1px); }

    /* ========== BANNER ========== */
    .banner {
      width: 100%;
      height: 80px;
      overflow: hidden;
    }

    /* ========== TAB NAV ========== */
    .tab-nav {
      max-width: 860px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      box-shadow: var(--shadow-sm);
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-btn {
      flex: 1;
      padding: 8px 16px;
      background: none;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .tab-btn:not(.active):hover { color: var(--text); background: var(--bg); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ========== DASHBOARD ========== */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .dash-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .dash-card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .dash-card-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    .dash-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .dash-card-trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 8px;
    }

    .trend-up { color: var(--green); background: var(--green-bg); }
    .trend-down { color: var(--red); background: var(--red-bg); }
    .trend-same { color: var(--text-muted); background: var(--bg); }

    /* Bar Chart */
    .chart-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .chart-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding-top: 10px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      max-width: 36px;
      border-radius: 6px 6px 2px 2px;
      background: var(--accent);
      transition: height 0.3s ease;
      min-height: 2px;
      position: relative;
      cursor: pointer;
    }

    .bar:hover { opacity: 0.8; }

    .bar-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .bar-value {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    /* Category Breakdown */
    .cat-breakdown {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cat-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cat-bar-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cat-bar-track {
      flex: 1;
      height: 10px;
      background: var(--border-light);
      border-radius: 5px;
      overflow: hidden;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .cat-bar-pct {
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }

    /* Heatmap */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      background: var(--border-light);
      position: relative;
      cursor: pointer;
    }

    .heatmap-cell:hover { outline: 2px solid var(--accent); outline-offset: 1px; }

    .heatmap-cell.l1 { background: #e9d5ff; }
    .heatmap-cell.l2 { background: #c084fc; }
    .heatmap-cell.l3 { background: #a855f7; }
    .heatmap-cell.l4 { background: var(--accent); }

    .heatmap-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .heatmap-labels span {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
    }

    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .heatmap-legend span {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .heatmap-legend-box {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Top items */
    .top-items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .top-item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 10px;
    }

    .top-item-rank {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .top-item-score {
      font-size: 13px;
      font-weight: 700;
    }

    .dash-section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 16px;
      margin-top: 8px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 640px) {
      .score-bar-inner { flex-direction: column; align-items: stretch; }
      .total-score { display: flex; align-items: center; justify-content: space-between; }
      .score-breakdown { grid-template-columns: repeat(3, 1fr); }
      .header-inner { padding: 12px 16px; }
      .score-bar, .container, .tab-nav { padding: 0 16px; }
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-bar-name { min-width: 80px; }
      .login-card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">L</div>
    <h1>LevelUp Habits</h1>
    <p>Track your daily habits.<br>Build discipline. Stay consistent.</p>
    <button class="google-btn" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<!-- App Content -->
<div class="app-content" id="appContent">

<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-logo">L</div>
      <h1>LevelUp Habits</h1>
    </div>
    <div class="header-right">
      <div class="date-nav">
        <button onclick="changeDate(-1)">&#8249;</button>
        <div class="date-display" id="dateDisplay"></div>
        <button onclick="changeDate(1)">&#8250;</button>
      </div>
      <div class="user-profile">

        <div class="user-menu" id="userMenu">
          <div class="user-menu-info">
            <div class="user-menu-name" id="userName"></div>

</div>

<!-- TRACKER TAB -->

<div class="score-bar">
  <div class="score-bar-inner">
    <div class="total-score">
      <div class="progress-ring">
        <svg width="96" height="96">
          <circle cx="48" cy="48" r="40" fill="none" stroke="var(--border-light)" stroke-width="7"/>
          <circle id="progressCircle" cx="48" cy="48" r="40" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-dasharray="251.33" stroke-dashoffset="251.33"/>
        </svg>
        <div class="progress-text">
          <div class="number" id="totalScore">0</div>

<!-- DASHBOARD TAB -->

    <!-- KPI Cards -->

    <!-- Weekly Bar Chart -->
    <div class="chart-container">
      <div class="chart-title">Daily Scores - Last 14 Days</div>

    <!-- Category Breakdown -->

      <div class="chart-title">Category Performance (Last 7 Days Avg)</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="addCategoryModal">
  <div class="modal">
    <h3>Add Category</h3>
    <label>Category Name</label>
    <input id="newCatName" type="text" placeholder="e.g. Fitness">

    <input id="newCatIcon" type="text" placeholder="e.g. 💪" maxlength="2">

    <input id="newCatColor" type="color" value="#7c3aed" style="height:42px;padding:4px;cursor:pointer;">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addCategoryModal')">Cancel</button>
      <button class="btn-confirm" onclick="addCategory()">Add</button>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBLDtF3hED_cxQFjl9wlPkenk4VrPIu5Fo",
  authDomain: "timebox1.firebaseapp.com",
  projectId: "timebox1",
  storageBucket: "timebox1.firebasestorage.app",
  messagingSenderId: "29674311183",
  appId: "1:29674311183:web:e716d5e1cd0b71e3529d7a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;

function googleSignIn() {
  auth.signInWithPopup(provider).catch(err => {
    alert('Sign in failed: ' + err.message);
  });
}

function signOut() { auth.signOut(); }

function toggleUserMenu() {
  document.getElementById('userMenu').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  const profile = document.querySelector('.user-profile');
  const menu = document.getElementById('userMenu');
  if (profile && menu && !profile.contains(e.target)) {
    menu.classList.remove('open');
  }
});

async function syncFromFirestore(user) {
  try {
    // Sync categories
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (userDoc.exists && userDoc.data().categories) {
      localStorage.setItem(user.uid + '_timebox_categories', userDoc.data().categories);
    }

    // Sync last 30 days of data
    const daysSnap = await db.collection('users').doc(user.uid).collection('days').get();
    daysSnap.forEach(doc => {
      localStorage.setItem(user.uid + '_timebox_' + doc.id, JSON.stringify(doc.data()));
    });
  } catch (e) {
    console.log('Firestore sync error:', e);
  }
}

auth.onAuthStateChanged(async function(user) {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=7c3aed&color=fff';
    document.getElementById('userName').textContent = user.displayName || 'User';
    document.getElementById('userEmail').textContent = user.email;

    // Pull data from Firestore first, then render
    await syncFromFirestore(user);
    render();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').style.display = 'none';
  }
});

const DEFAULT_CATEGORIES = [];

let currentDate = new Date();
let activeFilter = null;

function dateKey(d) { return d.toISOString().split('T')[0]; }

function userPrefix() { return currentUser ? currentUser.uid + '_' : ''; }

function getCategories() {
  const key = userPrefix() + 'timebox_categories';
  const saved = localStorage.getItem(key);
  if (saved) return JSON.parse(saved);
  return [];
}

function saveCategories(cats) {
  localStorage.setItem(userPrefix() + 'timebox_categories', JSON.stringify(cats));
  if (currentUser) {
    db.collection('users').doc(currentUser.uid).set({ categories: JSON.stringify(cats) }, { merge: true }).catch(() => {});
  }
}

function getDayData(date) {
  const key = userPrefix() + 'timebox_' + dateKey(date);
  const saved = localStorage.getItem(key);
  return saved ? JSON.parse(saved) : {};
}

function saveDayData(date, data) {
  const dk = dateKey(date);
  localStorage.setItem(userPrefix() + 'timebox_' + dk, JSON.stringify(data));
  if (currentUser) {
    db.collection('users').doc(currentUser.uid).collection('days').doc(dk).set(data).catch(() => {});
  }
}

function changeDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  render();
}

function isToday(d) {
  const t = new Date();
  return d.toDateString() === t.toDateString();
}

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function getCategoryScore(cat, dayData) {
  let score = 0;
  cat.items.forEach(item => { score += (dayData[item.id] || 0); });
  return score;
}

function getCategoryMax(cat) {
  return cat.items.reduce((sum, item) => sum + item.points, 0);
}

function render() {
  const cats = getCategories();
  const dayData = getDayData(currentDate);

  const dateEl = document.getElementById('dateDisplay');
  dateEl.innerHTML = isToday(currentDate)
    ? `<div class="today-label">Today</div>${formatDate(currentDate)}`
    : formatDate(currentDate);

  let totalScore = 0;
  let totalMax = 0;

  const catScores = cats.map(cat => {
    const score = getCategoryScore(cat, dayData);
    const max = getCategoryMax(cat);
    totalScore += score;
    totalMax += max;
    return { cat, score, max };
  });

  document.getElementById('totalScore').textContent = totalScore;
  document.getElementById('totalMax').textContent = `/ ${totalMax}`;

  const circle = document.getElementById('progressCircle');
  const circumference = 2 * Math.PI * 40;
  const pct = totalMax > 0 ? totalScore / totalMax : 0;
  circle.style.strokeDashoffset = circumference * (1 - pct);

  const scoreColor = pct >= 0.8 ? 'var(--green)' : pct >= 0.5 ? 'var(--amber)' : pct > 0 ? 'var(--accent)' : 'var(--text-muted)';
  circle.style.stroke = scoreColor;
  document.getElementById('totalScore').style.color = scoreColor;

  const breakdownEl = document.getElementById('scoreBreakdown');
  breakdownEl.innerHTML = catScores.map(({ cat, score, max }) => `
    <div class="score-chip ${activeFilter === cat.id ? 'active' : ''}" onclick="toggleFilter('${cat.id}')">
      <div class="chip-name">${cat.icon} ${cat.name}</div>
      <span class="chip-score">${score}</span><span class="chip-max">/${max}</span>
    </div>
  `).join('');

  const container = document.getElementById('categoriesContainer');
  const filteredScores = activeFilter ? catScores.filter(c => c.cat.id === activeFilter) : catScores;

  const totalCats = filteredScores.length;
  container.innerHTML = filteredScores.map(({ cat, score, max }, idx) => `
    <div class="category" id="cat-${cat.id}">
      <div class="category-header" onclick="toggleCategory('${cat.id}')">
        <div class="category-header-left">
          <button class="category-move" onclick="event.stopPropagation();moveCategory('${cat.id}',-1)" ${idx === 0 ? 'disabled' : ''} title="Move up">&#9650;</button>
          <button class="category-move" onclick="event.stopPropagation();moveCategory('${cat.id}',1)" ${idx === totalCats - 1 ? 'disabled' : ''} title="Move down">&#9660;</button>
          <div class="category-icon" style="background:${cat.color}15;color:${cat.color}">${cat.icon}</div>
          <div class="category-title">${cat.name}</div>
        </div>
        <div class="category-score-badge">
          <div class="category-score">${score} / ${max}</div>
          <span class="category-toggle">&#9662;</span>
          <button class="category-delete" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="Delete category"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
        </div>
      </div>
      <div class="category-body">
        ${cat.items.map(item => {
          const val = dayData[item.id] || 0;
          const done = val >= item.points;
          return `
            <div class="item ${done ? 'done' : ''}">
              <div class="item-left">
                <div class="item-check ${done ? 'checked' : ''}" onclick="quickToggle('${cat.id}','${item.id}',${item.points})"></div>
                <div class="item-name">${item.name}</div>
              </div>
              <div class="item-right">
                <input class="item-input" type="number" min="0" max="${item.points}" value="${val}"
                  onchange="updateValue('${item.id}', this.value, ${item.points})"
                  style="${done ? 'border-color:var(--green);color:var(--green)' : ''}">
                <span class="item-max">/ ${item.points}</span>
                <button class="item-delete" onclick="editItem('${cat.id}','${item.id}')" title="Edit" style="opacity:0.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
                <button class="item-delete" onclick="deleteItem('${cat.id}','${item.id}')" title="Remove">&times;</button>
              </div>
            </div>
          `;
        }).join('')}
        <div class="add-item-row">
          <input type="text" placeholder="Add new item..." id="newItem-${cat.id}">
          <input type="number" placeholder="Score" min="1" max="20" value="" id="newPts-${cat.id}">
          <button onclick="addItem('${cat.id}')">Add</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFilter(catId) {
  activeFilter = activeFilter === catId ? null : catId;
  render();
}

function toggleCategory(catId) {
  const el = document.getElementById('cat-' + catId);
  if (el) el.classList.toggle('collapsed');
}

function quickToggle(catId, itemId, maxPoints) {
  const dayData = getDayData(currentDate);
  const current = dayData[itemId] || 0;
  dayData[itemId] = current >= maxPoints ? 0 : maxPoints;
  saveDayData(currentDate, dayData);
  render();
}

function updateValue(itemId, value, maxPoints) {
  const dayData = getDayData(currentDate);
  const num = Math.max(0, Math.min(maxPoints, parseInt(value) || 0));
  dayData[itemId] = num;
  saveDayData(currentDate, dayData);
  render();
}

function addItem(catId) {
  const nameInput = document.getElementById('newItem-' + catId);
  const ptsInput = document.getElementById('newPts-' + catId);
  const name = nameInput.value.trim();
  const pts = parseInt(ptsInput.value);
  if (!name) return;
  if (!pts || pts < 1) { alert('Please enter a score for this item'); ptsInput.focus(); return; }
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const id = catId[0] + Date.now();
  cat.items.push({ id, name, max: 10, value: 0, points: pts });
  saveCategories(cats);
  render();
}

function moveCategory(catId, direction) {
  const cats = getCategories();
  const idx = cats.findIndex(c => c.id === catId);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= cats.length) return;
  const temp = cats[idx];
  cats[idx] = cats[newIdx];
  cats[newIdx] = temp;
  saveCategories(cats);
  render();
}

function deleteCategory(catId) {
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  if (!confirm('Delete "' + cat.name + '" category and all its items?')) return;
  const updated = cats.filter(c => c.id !== catId);
  saveCategories(updated);
  render();
}

function editItem(catId, itemId) {
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  const item = cat.items.find(i => i.id === itemId);
  if (!item) return;

  const newName = prompt('Edit item name:', item.name);
  if (newName === null) return;
  if (newName.trim() === '') { alert('Name cannot be empty'); return; }

  const newPts = prompt('Edit max score:', item.points);
  if (newPts === null) return;
  const pts = parseInt(newPts);
  if (!pts || pts < 1) { alert('Please enter a valid score (1 or more)'); return; }

  item.name = newName.trim();
  item.points = pts;
  saveCategories(cats);
  render();
}

function deleteItem(catId, itemId) {
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  cat.items = cat.items.filter(i => i.id !== itemId);
  saveCategories(cats);
  render();
}

function openAddCategoryModal() {
  document.getElementById('addCategoryModal').classList.add('open');
  document.getElementById('newCatName').focus();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim() || '📌';
  const color = document.getElementById('newCatColor').value;
  if (!name) return;
  const cats = getCategories();
  const id = name.toLowerCase().replace(/\s+/g, '_') + '_' + Date.now();
  cats.push({ id, name, icon, color, items: [] });
  saveCategories(cats);
  closeModal('addCategoryModal');
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatIcon').value = '';
  render();
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderHistory();
}

function renderHistory() {
  const cats = getCategories();
  const listEl = document.getElementById('historyList');
  const streakEl = document.getElementById('streakBar');
  let html = '';
  let streakHtml = '';

  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dayData = getDayData(d);
    let totalScore = 0;
    let totalMax = 0;
    cats.forEach(cat => {
      totalScore += getCategoryScore(cat, dayData);
      totalMax += getCategoryMax(cat);
    });
    const pct = totalMax > 0 ? totalScore / totalMax : 0;
    let level = '';
    if (pct > 0.8) level = 'full';
    else if (pct > 0.6) level = 'high';
    else if (pct > 0.3) level = 'mid';
    else if (pct > 0) level = 'low';
    streakHtml += `<div class="streak-day ${level}" title="${dateKey(d)}: ${totalScore}/${totalMax}"></div>`;
    if (totalScore > 0) {
      html = `<div class="history-row">
        <span class="history-date">${formatDate(d)}</span>
        <span class="history-score" style="color:${pct >= 0.8 ? 'var(--green)' : pct >= 0.5 ? 'var(--amber)' : 'var(--accent)'}">${totalScore} / ${totalMax}</span>
      </div>` + html;
    }
  }

  streakEl.innerHTML = streakHtml;
  listEl.innerHTML = html || '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">No data yet. Start tracking today!</div>';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'dashboard') renderDashboard();
}

function renderDashboard() {
  const cats = getCategories();

  // Gather 30 days of data
  const daysData = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dayData = getDayData(d);
    let total = 0, max = 0;
    const catScores = {};
    cats.forEach(cat => {
      const s = getCategoryScore(cat, dayData);
      const m = getCategoryMax(cat);
      total += s;
      max += m;
      catScores[cat.id] = { score: s, max: m };
    });
    daysData.push({ date: d, dayData, total, max, pct: max > 0 ? total / max : 0, catScores });
  }

  // ===== KPI CARDS =====
  const today = daysData[0];
  const thisWeek = daysData.slice(0, 7);
  const lastWeek = daysData.slice(7, 14);

  const thisWeekAvg = thisWeek.reduce((s, d) => s + d.pct, 0) / thisWeek.length;
  const lastWeekAvg = lastWeek.reduce((s, d) => s + d.pct, 0) / lastWeek.length;
  const weekTrend = thisWeekAvg - lastWeekAvg;

  const activeDays = daysData.filter(d => d.total > 0).length;
  let streak = 0;
  for (let i = 0; i < daysData.length; i++) {
    if (daysData[i].total > 0) streak++;
    else break;
  }

  const bestDay = daysData.reduce((best, d) => d.pct > best.pct ? d : best, daysData[0]);

  const trendHtml = (val) => {
    if (val > 0.01) return `<div class="dash-card-trend trend-up">&#9650; ${Math.round(val*100)}%</div>`;
    if (val < -0.01) return `<div class="dash-card-trend trend-down">&#9660; ${Math.round(Math.abs(val)*100)}%</div>`;
    return `<div class="dash-card-trend trend-same">&#8212; Same</div>`;
  };

  document.getElementById('dashKPIs').innerHTML = `
    <div class="dash-card">
      <div class="dash-card-label">Today's Score</div>
      <div class="dash-card-value" style="color:${today.pct >= 0.8 ? 'var(--green)' : today.pct >= 0.5 ? 'var(--amber)' : 'var(--accent)'}">${today.total}</div>
      <div class="dash-card-sub">out of ${today.max}</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label">Weekly Average</div>
      <div class="dash-card-value" style="color:var(--accent)">${Math.round(thisWeekAvg * 100)}%</div>
      ${trendHtml(weekTrend)}
    </div>
    <div class="dash-card">
      <div class="dash-card-label">Current Streak</div>
      <div class="dash-card-value" style="color:var(--amber)">${streak}</div>
      <div class="dash-card-sub">day${streak !== 1 ? 's' : ''} in a row</div>
    </div>
  `;

  // ===== BAR CHART (14 days) =====
  const last14 = daysData.slice(0, 14).reverse();
  const maxScore = Math.max(...last14.map(d => d.total), 1);
  const dayNames = ['S','M','T','W','T','F','S'];

  document.getElementById('dashBarChart').innerHTML = last14.map(d => {
    const h = Math.max(2, (d.total / maxScore) * 140);
    const color = d.pct >= 0.8 ? 'var(--green)' : d.pct >= 0.5 ? 'var(--amber)' : d.total > 0 ? 'var(--accent)' : 'var(--border)';
    return `<div class="bar-col">
      <div class="bar-value">${d.total}</div>
      <div class="bar" style="height:${h}px;background:${color}" title="${formatDate(d.date)}: ${d.total}/${d.max}"></div>
      <div class="bar-label">${dayNames[d.date.getDay()]}</div>
    </div>`;
  }).join('');

  // ===== CATEGORY BREAKDOWN (7 day avg) =====
  const catAvgs = cats.map(cat => {
    let totalScore = 0, totalMax = 0;
    thisWeek.forEach(d => {
      const cs = d.catScores[cat.id];
      if (cs) { totalScore += cs.score; totalMax += cs.max; }
    });
    const pct = totalMax > 0 ? totalScore / totalMax : 0;
    return { cat, pct, totalScore, totalMax };
  }).sort((a, b) => b.pct - a.pct);

  document.getElementById('dashCatBreakdown').innerHTML = catAvgs.map(({ cat, pct }) => `
    <div class="cat-bar-row">
      <div class="cat-bar-name">${cat.icon} ${cat.name}</div>
      <div class="cat-bar-track">
        <div class="cat-bar-fill" style="width:${Math.round(pct*100)}%;background:${cat.color}"></div>
      </div>
      <div class="cat-bar-pct" style="color:${pct >= 0.8 ? 'var(--green)' : pct >= 0.5 ? 'var(--amber)' : 'var(--accent)'}">${Math.round(pct*100)}%</div>
    </div>
  `).join('');

  // ===== HEATMAP (56 days / 8 weeks) =====
  const heatmapDays = [];
  const startDay = new Date();
  // Go back to last Sunday
  startDay.setDate(startDay.getDate() - startDay.getDay() - 49);
  for (let i = 0; i < 56; i++) {
    const d = new Date(startDay);
    d.setDate(d.getDate() + i);
    const dayData = getDayData(d);
    let total = 0, max = 0;
    cats.forEach(cat => {
      total += getCategoryScore(cat, dayData);
      max += getCategoryMax(cat);
    });
    const pct = max > 0 ? total / max : 0;
    let level = '';
    if (pct > 0.8) level = 'l4';
    else if (pct > 0.6) level = 'l3';
    else if (pct > 0.3) level = 'l2';
    else if (pct > 0) level = 'l1';
    heatmapDays.push({ d, pct, level, total, max });
  }

  document.getElementById('dashHeatmap').innerHTML = heatmapDays.map(h =>
    `<div class="heatmap-cell ${h.level}" title="${formatDate(h.d)}: ${h.total}/${h.max} (${Math.round(h.pct*100)}%)"></div>`
  ).join('');

  // ===== TOP & BOTTOM ITEMS =====
  const itemStats = [];
  cats.forEach(cat => {
    cat.items.forEach(item => {
      let completed = 0;
      thisWeek.forEach(d => {
        const val = d.dayData[item.id] || 0;
        if (val >= item.points) completed++;
      });
      itemStats.push({ name: item.name, icon: cat.icon, completed, total: 7, pct: completed / 7 });
    });
  });

  const sorted = [...itemStats].sort((a, b) => b.pct - a.pct);
  const top5 = sorted.slice(0, 5);
  const bottom5 = sorted.filter(i => i.pct < 1).sort((a, b) => a.pct - b.pct).slice(0, 5);

  document.getElementById('dashTopItems').innerHTML = top5.map((item, i) => `
    <div class="top-item-row">
      <div class="top-item-rank">${i + 1}</div>
      <div class="top-item-name">${item.icon} ${item.name}</div>
      <div class="top-item-score" style="color:var(--green)">${item.completed}/7</div>
    </div>
  `).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:12px">No data yet</div>';

  document.getElementById('dashBottomItems').innerHTML = bottom5.map((item, i) => `
    <div class="top-item-row">
      <div class="top-item-rank" style="background:var(--red-bg);color:var(--red)">${i + 1}</div>
      <div class="top-item-name">${item.icon} ${item.name}</div>
      <div class="top-item-score" style="color:var(--red)">${item.completed}/7</div>
    </div>
  `).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:12px">No data yet</div>';
}

function toggleDataTable() {
  const panel = document.getElementById('dataTablePanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderDataTable();
}

function renderDataTable() {
  const cats = getCategories();
  const days = parseInt(document.getElementById('tableRange').value) || 30;
  const wrap = document.getElementById('dataTableWrap');

  // Build all item names for columns
  const allItems = [];
  cats.forEach(cat => {
    cat.items.forEach(item => {
      allItems.push({ catName: cat.name, itemName: item.name, id: item.id, points: item.points });
    });
  });

  let html = '<table class="data-table"><thead><tr>';
  html += '<th>Date</th>';
  cats.forEach(cat => {
    html += `<th>${cat.icon} ${cat.name}</th>`;
  });
  html += '<th>Total</th>';
  html += '</tr></thead><tbody>';

  for (let i = 0; i < days; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dayData = getDayData(d);

    let rowTotal = 0;
    let totalMax = 0;

    html += '<tr>';
    html += `<td style="font-weight:600;color:var(--text)">${formatDate(d)}</td>`;

    cats.forEach(cat => {
      const score = getCategoryScore(cat, dayData);
      const max = getCategoryMax(cat);
      rowTotal += score;
      totalMax += max;

      let cls = 'score-zero';
      if (score >= max && max > 0) cls = 'score-full';
      else if (score > 0) cls = 'score-partial';

      html += `<td class="score-cell ${cls}">${score}/${max}</td>`;
    });

    const pct = totalMax > 0 ? rowTotal / totalMax : 0;
    let totalCls = 'score-zero';
    if (pct >= 0.8) totalCls = 'score-full';
    else if (pct > 0) totalCls = 'score-partial';

    html += `<td class="score-cell ${totalCls}" style="font-size:13px">${rowTotal}/${totalMax}</td>`;
    html += '</tr>';
  }

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function exportCSV() {
  const cats = getCategories();
  const allItems = [];
  cats.forEach(cat => {
    cat.items.forEach(item => {
      allItems.push({ catName: cat.name, itemName: item.name, id: item.id, points: item.points });
    });
  });

  // Header row
  let csv = 'Date';
  allItems.forEach(item => {
    csv += ',"' + item.catName + ' - ' + item.itemName.replace(/"/g, '""') + '"';
  });
  cats.forEach(cat => {
    csv += ',"' + cat.name + ' Total"';
  });
  csv += ',Total Score,Total Max,Percentage\n';

  // Data rows - last 90 days
  for (let i = 89; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dayData = getDayData(d);

    csv += dateKey(d);

    allItems.forEach(item => {
      csv += ',' + (dayData[item.id] || 0);
    });

    let rowTotal = 0;
    let totalMax = 0;
    cats.forEach(cat => {
      const score = getCategoryScore(cat, dayData);
      const max = getCategoryMax(cat);
      rowTotal += score;
      totalMax += max;
      csv += ',' + score;
    });

    const pct = totalMax > 0 ? Math.round((rowTotal / totalMax) * 100) : 0;
    csv += ',' + rowTotal + ',' + totalMax + ',' + pct + '%\n';
  }

  // Download
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'timebox-data-' + dateKey(new Date()) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('addCategoryModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('addCategoryModal');
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal('addCategoryModal');
});

render();
</script>
